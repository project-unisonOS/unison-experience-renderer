name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools==75.6.0
          pip install -c constraints.txt -r requirements.txt
          pip install -c constraints.txt git+https://github.com/project-unisonOS/unison-common.git@eef1a7353b2c795233daf0db6079b867ff2d98ba
      - name: Test
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          OTEL_SDK_DISABLED: "true"
          DISABLE_AUTH_FOR_TESTS: "true"
        run: |
          bash scripts/guard_no_legacy_ui.sh
          python -m pytest -q
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
      - name: Install Chromium accessibility runner
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run real-browser Phase 1 and Phase 2 accessibility evidence
        env:
          DISABLE_AUTH_FOR_TESTS: "true"
          UNISON_PRINCIPAL_BINDING_TEST_BYPASS: "true"
        run: |
          python -m uvicorn main:app --app-dir src --host 127.0.0.1 --port 8099 >/tmp/unison-renderer-http.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8099/ >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/unison-renderer-http.log
              exit 1
            fi
            sleep 1
          done
          npm run test:phase2-accessibility
