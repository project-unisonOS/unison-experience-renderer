<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnisonOS Renderer</title>
    <style>
      :root {
        --field-bg: #000;
        --field-fg: rgba(255, 255, 255, 0.92);
        --muted-fg: rgba(255, 255, 255, 0.7);
        --ease-organic: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-soft: cubic-bezier(0.2, 0, 0, 1);
        --dur-fast: 180ms;
        --dur-med: 420ms;
        --dur-slow: 900ms;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--field-bg);
        color: var(--field-fg);
        overflow: hidden;
      }

      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
      }

      main#field {
        position: relative;
        width: 100%;
        height: 100%;
        background: var(--field-bg);
      }

      main#field[data-motion="depthEmergence"] .glyph {
        filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.18));
      }

      main#field[data-motion="drift"] .glyph.on {
        transform: translate3d(0, -10px, 0) scale(1);
      }

      .center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .glyph {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.14));
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.96);
        transition: opacity var(--dur-med) var(--ease-organic), transform var(--dur-med) var(--ease-organic);
      }

      .glyph.on {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }

      .glyph.presence-cue {
        opacity: 0.1;
        animation: presenceBreath 4.2s var(--ease-organic) infinite;
      }

      @keyframes presenceBreath {
        0% { opacity: 0.06; transform: translate3d(0, 0, 0) scale(0.96); }
        55% { opacity: 0.14; transform: translate3d(0, 0, 0) scale(1.06); }
        100% { opacity: 0.06; transform: translate3d(0, 0, 0) scale(0.96); }
      }

      .question {
        max-width: min(72ch, 86vw);
        text-align: center;
        white-space: pre-line;
        letter-spacing: 0.1px;
        font-size: clamp(16px, 2.2vw, 22px);
        line-height: 1.35;
        color: var(--field-fg);
        opacity: 0;
        transform: translate3d(0, 10px, 0);
        transition: opacity var(--dur-med) var(--ease-soft), transform var(--dur-med) var(--ease-organic);
      }

      .question.on {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .quiet-label {
        position: absolute;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        max-width: min(72ch, 88vw);
        text-align: center;
        white-space: pre-line;
        font-size: 12px;
        letter-spacing: 0.24px;
        color: var(--muted-fg);
        opacity: 0;
        transition: opacity var(--dur-med) var(--ease-soft);
      }

      .watermark {
        position: absolute;
        right: 14px;
        bottom: 12px;
        font-size: 11px;
        letter-spacing: 0.18px;
        color: rgba(255, 255, 255, 0.52);
        opacity: 0;
        transition: opacity var(--dur-med) var(--ease-soft);
        pointer-events: none;
        text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
      }

      .actions {
        position: absolute;
        left: 50%;
        bottom: 54px;
        transform: translateX(-50%);
        width: min(760px, 92vw);
        display: none;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        pointer-events: auto;
      }

      .actions[data-visible="true"] {
        display: flex;
      }

      .action-btn,
      .wakeword-input {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: var(--field-fg);
        border-radius: 999px;
        min-height: 38px;
        padding: 0 14px;
        font: inherit;
        letter-spacing: 0.1px;
        backdrop-filter: blur(12px);
      }

      .action-btn {
        cursor: pointer;
        transition: background var(--dur-fast) var(--ease-soft), border-color var(--dur-fast) var(--ease-soft);
      }

      .action-btn:hover,
      .action-btn:focus-visible {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.28);
        outline: none;
      }

      .wakeword-input {
        min-width: min(220px, 60vw);
      }

      .bootstrap-input {
        min-width: min(180px, 52vw);
      }

      .action-note {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        width: min(760px, 92vw);
        text-align: center;
        font-size: 12px;
        line-height: 1.35;
        color: var(--muted-fg);
        opacity: 0;
        transition: opacity var(--dur-med) var(--ease-soft);
      }

      .action-note[data-visible="true"] {
        opacity: 1;
      }

      .logo {
        width: min(240px, 56vw);
        max-height: 120px;
        object-fit: contain;
        opacity: 0;
        transform: translate3d(0, 10px, 0) scale(0.98);
        transition: opacity var(--dur-med) var(--ease-soft), transform var(--dur-med) var(--ease-organic);
      }

      .logo.on {
        opacity: 0.92;
        transform: translate3d(0, 0, 0) scale(1);
      }

      @media (prefers-reduced-motion: reduce) {
        .glyph,
        .question,
        .logo {
          transition: none;
        }
        .glyph.presence-cue {
          animation: none;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main id="field" role="main" data-scene="presence">
      <div class="center" aria-hidden="true">
        <img id="logo" class="logo" alt="" />
        <div id="glyph" class="glyph"></div>
        <div id="question" class="question"></div>
      </div>
      <div id="actions" class="actions" aria-live="polite">
        <button id="refreshAction" class="action-btn" type="button">Recheck</button>
        <input id="bootstrapUser" class="wakeword-input bootstrap-input" type="text" maxlength="32" placeholder="admin username" />
        <input id="bootstrapEmail" class="wakeword-input bootstrap-input" type="email" maxlength="120" placeholder="admin email" />
        <input id="bootstrapPassword" class="wakeword-input bootstrap-input" type="password" maxlength="128" placeholder="admin password" />
        <input id="bootstrapToken" class="wakeword-input bootstrap-input" type="password" maxlength="256" placeholder="bootstrap token" />
        <button id="bootstrapAction" class="action-btn" type="button">Create admin</button>
        <button id="micAction" class="action-btn" type="button">Check microphone</button>
        <button id="speakerAction" class="action-btn" type="button">Check speaker</button>
        <button id="modelAction" class="action-btn" type="button">Confirm model</button>
        <input id="wakewordInput" class="wakeword-input" type="text" maxlength="32" placeholder="wakeword" />
        <button id="wakewordOnAction" class="action-btn" type="button">Use wakeword</button>
        <button id="wakewordOffAction" class="action-btn" type="button">Keep wakeword off</button>
        <button id="finishAction" class="action-btn" type="button">Finish setup</button>
      </div>
      <div id="actionNote" class="action-note" aria-live="polite"></div>
      <div id="quietLabel" class="quiet-label" aria-hidden="true"></div>
      <div id="watermark" class="watermark" aria-hidden="true"></div>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
